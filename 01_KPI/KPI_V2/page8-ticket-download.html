<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download de Tickets | KPI</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .download-hero { margin-bottom:18px; padding:22px; border:1px solid var(--color-border); border-radius:var(--radius-lg); background:var(--color-surface); }
    .download-eyebrow { margin:0 0 8px; color:var(--color-primary-hover); font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; font-weight:800; }
    .download-title { margin:0; font-size:1.65rem; line-height:1.16; }
    .download-meta { margin:8px 0 0; color:var(--color-text-muted); font-size:.82rem; }
    .download-kpis { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:16px; }
    .download-kpi { padding:16px; border:1px solid var(--color-border); border-top:4px solid var(--color-border); border-radius:var(--radius-lg); background:var(--color-surface-2); min-height:112px; }
    .download-kpi.primary { border-top-color:var(--color-primary); }
    .download-kpi.green { border-top-color:var(--color-green); }
    .download-kpi.yellow { border-top-color:var(--color-yellow); }
    .download-kpi.red { border-top-color:var(--color-red); }
    .download-kpi span { display:block; margin-bottom:10px; color:var(--color-text-muted); font-size:.7rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
    .download-kpi strong { font-family:var(--font-mono); font-size:1.55rem; }
    .download-toolbar { display:grid; grid-template-columns:1fr auto; gap:14px; align-items:end; padding:16px; border:1px solid var(--color-border); border-radius:var(--radius-lg); background:var(--color-surface-2); margin-bottom:16px; }
    .download-controls { display:grid; grid-template-columns:repeat(4,minmax(150px,1fr)); gap:10px; }
    .download-field label { display:block; margin:0 0 5px; color:var(--color-text-muted); font-size:.68rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; }
    .download-field input, .download-field select { width:100%; height:36px; border:1px solid var(--color-border); border-radius:var(--radius-md); background:var(--color-surface); color:var(--color-text); padding:0 10px; }
    .download-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .download-status { margin:0 0 12px; color:var(--color-text-muted); font-size:.8rem; }
    .download-table-wrap { overflow:auto; max-height:620px; border:1px solid var(--color-border); border-radius:var(--radius-lg); background:var(--color-surface-2); }
    .download-table { width:100%; min-width:1320px; border-collapse:collapse; font-size:.82rem; }
    .download-table th, .download-table td { padding:9px 10px; border-bottom:1px solid var(--color-border); text-align:left; vertical-align:top; }
    .download-table th { position:sticky; top:0; z-index:1; background:var(--color-surface); color:var(--color-text-muted); font-size:.68rem; letter-spacing:.06em; text-transform:uppercase; }
    .download-table td.mono { font-family:var(--font-mono); white-space:nowrap; }
    .download-empty { padding:28px; text-align:center; color:var(--color-text-muted); }
    @media (max-width:1100px){ .download-kpis{grid-template-columns:repeat(2,minmax(0,1fr));}.download-toolbar{grid-template-columns:1fr;}.download-controls{grid-template-columns:repeat(2,minmax(150px,1fr));}.download-actions{justify-content:flex-start;} }
    @media (max-width:680px){ .download-kpis,.download-controls{grid-template-columns:1fr;}.download-actions .btn{flex:1;} }
  </style>
  <style id="playbook-auth-pending-style">html.playbook-auth-pending body{visibility:hidden}</style>
  <script>document.documentElement.classList.add("playbook-auth-pending");</script>
  <script src="../../config/supabase.js"></script>
  <script src="../../js/playbook-auth.js"></script>
  <script src="../../js/playbook-auth-guard.js"></script>
  <script src="js/i18n.js"></script>
</head>
<body>
  <div class="dashboard-shell">
    <header class="app-header">
      <div class="app-header-inner">
        <div class="app-brand">
          <p class="app-brand-title" data-i18n="ticket_download_title">Download de Tickets</p>
          <p class="app-brand-subtitle">Playbook Global | KPI</p>
          <p id="last-sync" style="font-size:.7rem;color:var(--color-text-muted);margin:2px 0 0;opacity:.8;">--</p>
        </div>
        <div class="app-header-actions">
          <a href="../../index.html" class="back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
            <span data-i18n="back_to_playbook">Voltar</span>
          </a>
          <div class="lang-switch" role="group" aria-label="Language">
            <button type="button" data-lang="pt">PT</button>
            <button type="button" data-lang="en">EN</button>
            <button type="button" data-lang="es">ES</button>
          </div>
          <button type="button" id="btn-theme-toggle" class="btn btn-ghost btn-sm" title="Alternar tema" style="padding:6px 10px;font-size:15px;line-height:1;">Lua</button>
        </div>
      </div>
    </header>

    <nav class="app-nav" aria-label="Dashboard pages">
      <div class="app-nav-inner">
        <a href="page2-backlog.html" data-i18n="nav_backlog">Daily</a>
        <a href="page4-weekly.html" data-i18n="nav_weekly">Weekly</a>
        <a href="page5-monthly.html" data-i18n="nav_monthly">Monthly</a>
        <a href="page6-business-hours.html" data-i18n="nav_business_hours">Hor&aacute;rios Comerciais</a>
        <a href="page7-hours-comparison.html" data-i18n="nav_hours_comparison">Comparativo</a>
        <a href="page8-ticket-download.html" class="is-active" data-i18n="nav_ticket_download">Download Excel</a>
      </div>
    </nav>

    <main class="app-main">
      <section class="download-hero">
        <p class="download-eyebrow" data-i18n="ticket_download_eyebrow">Base operacional</p>
        <h1 class="download-title" data-i18n="ticket_download_heading">Exportar tickets em Excel</h1>
        <p class="download-meta" id="download-meta" data-i18n="ticket_download_loading">Carregando tickets...</p>
      </section>

      <section class="download-kpis" aria-label="Resumo dos tickets">
        <article class="download-kpi primary"><span data-i18n="ticket_download_total">Total na base</span><strong id="kpi-total">--</strong></article>
        <article class="download-kpi green"><span data-i18n="ticket_download_filtered">Filtrados</span><strong id="kpi-filtered">--</strong></article>
        <article class="download-kpi yellow"><span data-i18n="ticket_download_open">Abertos</span><strong id="kpi-open">--</strong></article>
        <article class="download-kpi red"><span data-i18n="ticket_download_closed">Fechados</span><strong id="kpi-closed">--</strong></article>
      </section>

      <section class="download-toolbar" aria-label="Filtros para download">
        <div class="download-controls">
          <div class="download-field"><label for="filter-search" data-i18n="ticket_download_search">Busca</label><input id="filter-search" type="search" placeholder="Ticket, assunto, solicitante" data-i18n-placeholder="ticket_download_search_placeholder"></div>
          <div class="download-field"><label for="filter-region" data-i18n="filter_region">Regiao</label><select id="filter-region"></select></div>
          <div class="download-field"><label for="filter-status" data-i18n="filter_status">Status</label><select id="filter-status"></select></div>
          <div class="download-field"><label for="filter-priority" data-i18n="filter_priority">Prioridade</label><select id="filter-priority"></select></div>
          <div class="download-field"><label for="filter-department" data-i18n="filter_department">Departamento</label><select id="filter-department"></select></div>
          <div class="download-field"><label for="filter-agent-group" data-i18n="filter_agent_group">Grupo do Agente</label><select id="filter-agent-group"></select></div>
          <div class="download-field"><label for="filter-date-field" data-i18n="ticket_download_date_field">Campo de data</label><select id="filter-date-field"><option value="created_time" data-i18n="ticket_download_created_time">Criacao</option><option value="closed_time" data-i18n="ticket_download_closed_time">Fechamento</option></select></div>
          <div class="download-field"><label for="filter-date-from" data-i18n="ticket_download_from">De</label><input id="filter-date-from" type="date"></div>
          <div class="download-field"><label for="filter-date-to" data-i18n="filter_to">Ate</label><input id="filter-date-to" type="date"></div>
        </div>
        <div class="download-actions">
          <button type="button" class="btn btn-primary btn-sm" id="btn-download-xls" data-i18n="ticket_download_button">Baixar Excel</button>
          <button type="button" class="btn btn-ghost btn-sm" id="btn-refresh" data-i18n="btn_refresh">Atualizar</button>
          <button type="button" class="btn btn-ghost btn-sm" id="btn-clear" data-i18n="btn_clear">Limpar</button>
        </div>
      </section>

      <p class="download-status" id="download-status">--</p>
      <section class="download-table-wrap" aria-label="Previa dos tickets">
        <table class="download-table">
          <thead><tr id="preview-head"></tr></thead>
          <tbody id="preview-body"><tr><td class="download-empty">--</td></tr></tbody>
        </table>
      </section>
    </main>

    <footer class="app-footer" data-i18n="app_footer">Playbook Global - Global Service - Modulo KPI</footer>
  </div>

  <script src="js/business-rules.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/ticket-download.js"></script>
</body>
</html>
